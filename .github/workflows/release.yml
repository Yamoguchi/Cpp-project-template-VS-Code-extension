name: Release VS Code Extension

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build and Release VSIX
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Package VSIX
        run: npm run package:vsix -- --out cpp-template-generator-${{ github.ref_name }}.vsix

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: cpp-template-generator-${{ github.ref_name }}
          path: cpp-template-generator-${{ github.ref_name }}.vsix

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: cpp-template-generator-${{ github.ref_name }}.vsix
